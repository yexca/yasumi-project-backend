replication:
  connections:
    - type: postgresql
      uri: postgresql://yasumi:yasumi@postgres:5432/yasumi
      sslmode: disable

storage:
  type: mongodb
  uri: mongodb://mongo:27017/yasumi_powersync

port: 8080

sync_config:
  path: /config/sync-config.yaml

client_auth:
  audience: ["powersync-dev", "powersync"]
  jwks:
    keys:
      - kty: oct
        kid: local-dev-sync-key
        alg: HS256
        k: bG9jYWwtZGV2LXN5bmMtc2VjcmV0LWNoYW5nZS1tZQ

system:
  logging:
    level: info
    format: text
