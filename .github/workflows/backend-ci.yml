name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      YASUMI_SYNC_TOKEN_SECRET: test-sync-secret
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: yasumi
          POSTGRES_USER: yasumi
          POSTGRES_PASSWORD: yasumi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yasumi -d yasumi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Test
        run: go test ./...

      - name: Repository integration tests
        run: go test ./internal/repository -count=1 -v

      - name: Vet
        run: go vet ./...

      - name: Build Docker image
        run: docker build -t yasumi-api-ci .
