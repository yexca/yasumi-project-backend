name: yasumi-backend

x-yasumi-environment: &yasumi-environment
  YASUMI_APP_ENV: ${YASUMI_APP_ENV:-local}
  YASUMI_HTTP_HOST: 0.0.0.0
  YASUMI_HTTP_PORT: ${YASUMI_HTTP_PORT:-7659}
  YASUMI_HTTP_ALLOWED_ORIGINS: ${YASUMI_HTTP_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:4175,http://localhost:4175}
  YASUMI_HTTP_READ_HEADER_TIMEOUT: ${YASUMI_HTTP_READ_HEADER_TIMEOUT:-5s}
  YASUMI_HTTP_SHUTDOWN_TIMEOUT: ${YASUMI_HTTP_SHUTDOWN_TIMEOUT:-10s}
  YASUMI_HTTP_REQUEST_TIMEOUT: ${YASUMI_HTTP_REQUEST_TIMEOUT:-10s}
  YASUMI_LOG_LEVEL: ${YASUMI_LOG_LEVEL:-info}
  YASUMI_LOG_FORMAT: ${YASUMI_LOG_FORMAT:-json}
  YASUMI_AUTH_DEV_TOKEN: ${YASUMI_AUTH_DEV_TOKEN:-local-dev-session-token}
  YASUMI_AUTH_DEV_USER_ID: ${YASUMI_AUTH_DEV_USER_ID:-00000000-0000-4000-8000-000000000001}
  YASUMI_AUTH_DEV_DISPLAY_NAME: ${YASUMI_AUTH_DEV_DISPLAY_NAME:-Yasumi User}
  YASUMI_SYNC_TOKEN_SECRET: ${YASUMI_SYNC_TOKEN_SECRET:-local-dev-sync-secret-change-me}
  YASUMI_SYNC_TOKEN_TTL: ${YASUMI_SYNC_TOKEN_TTL:-15m}
  YASUMI_POSTGRES_HOST: postgres
  YASUMI_POSTGRES_PORT: 5432
  YASUMI_POSTGRES_DB: ${YASUMI_POSTGRES_DB:-yasumi}
  YASUMI_POSTGRES_USER: ${YASUMI_POSTGRES_USER:-yasumi}
  YASUMI_POSTGRES_PASSWORD: ${YASUMI_POSTGRES_PASSWORD:-yasumi}
  YASUMI_POSTGRES_SSLMODE: disable
  YASUMI_POWERSYNC_URL: ${YASUMI_POWERSYNC_URL:-http://powersync:8080}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${YASUMI_POSTGRES_DB:-yasumi}
      POSTGRES_USER: ${YASUMI_POSTGRES_USER:-yasumi}
      POSTGRES_PASSWORD: ${YASUMI_POSTGRES_PASSWORD:-yasumi}
    ports:
      - "${YASUMI_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - yasumi-postgres-data:/var/lib/postgresql/data
    command: ["postgres", "-c", "wal_level=logical"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/yasumi-migrate"]
    environment:
      <<: *yasumi-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *yasumi-environment
    ports:
      - "${YASUMI_HTTP_HOST_PORT:-7659}:${YASUMI_HTTP_PORT:-7659}"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${YASUMI_HTTP_PORT}/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../yasumi-project-frontend
      dockerfile: env/Dockerfile
    environment:
      VITE_BACKEND_BASE_URL: ${VITE_BACKEND_BASE_URL:-http://127.0.0.1:7659}
      VITE_POWERSYNC_ENDPOINT: ${VITE_POWERSYNC_ENDPOINT:-http://127.0.0.1:8081}
    ports:
      - "${YASUMI_FRONTEND_HOST_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy

  powersync:
    image: journeyapps/powersync-service:latest
    profiles: ["sync"]
    command: ["start", "-r", "unified"]
    volumes:
      - ./env/powersync/service.yaml:/config/service.yaml:ro
      - ./env/powersync/sync-config.yaml:/config/sync-config.yaml:ro
    environment:
      POWERSYNC_CONFIG_PATH: /config/service.yaml
    ports:
      - "${YASUMI_POWERSYNC_HOST_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo-rs-init:
        condition: service_completed_successfully

  mongo:
    image: mongo:7.0
    profiles: ["sync"]
    command: --replSet rs0 --bind_ip_all --quiet
    volumes:
      - yasumi-powersync-mongo-data:/data/db

  mongo-rs-init:
    image: mongo:7.0
    profiles: ["sync"]
    depends_on:
      - mongo
    restart: "no"
    entrypoint:
      - bash
      - -c
      - 'sleep 10 && mongosh --host mongo:27017 --eval ''try{rs.status().ok && quit(0)} catch {} rs.initiate({_id: "rs0", version: 1, members: [{ _id: 0, host : "mongo:27017" }]})'''

volumes:
  yasumi-postgres-data:
  yasumi-powersync-mongo-data:
